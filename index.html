<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cartoon Animation</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #87CEEB; /* sky blue */
    }

    .face {
      width: 150px;
      height: 150px;
      background: yellow;
      border-radius: 50%;
      position: relative;
      animation: bounce 1s infinite alternate ease-in-out;
    }

    .eye {
      width: 20px;
      height: 20px;
      background: black;
      border-radius: 50%;
      position: absolute;
      top: 40px;
    }

    .eye.left {
      left: 35px;
    }

    .eye.right {
      right: 35px;
    }

    .mouth {
      width: 60px;
      height: 30px;
      border-bottom: 5px solid black;
      border-radius: 0 0 50px 50px;
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
    }

    @keyframes bounce {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-50px);
      }
    }
  </style>
</head>
<body>

  <div class="face">
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="mouth"></div>
  </div>

</body>
</html>
